<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profin — Screen</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 26 26'%3E%3Crect width='26' height='26' rx='7' fill='%231c1a16'/%3E%3Crect x='8.5' y='8.5' width='9' height='9' rx='2' fill='%23c0703a'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/app.css">
  <link rel="stylesheet" href="/static/company.css">
  <link rel="stylesheet" href="/static/compare.css">
  <link rel="stylesheet" href="/static/screen.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo" aria-label="Profin home">
        <span class="logo-mark"><span class="logo-dot"></span></span>
        <span class="logo-word">Profin</span>
      </a>
      <div class="nav-links">
        <a href="/compare">Compare</a>
        <a href="/screen" class="current">Screen</a>
        <a href="/coverage">Coverage</a>
        <a href="/docs">Docs</a>
        <a href="/explorer">Data Explorer</a>
        <a href="/docs" class="pill">API Reference</a>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="navMobile">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="nav-mobile" id="navMobile">
      <a href="/compare">Compare</a>
      <a href="/screen" class="current">Screen</a>
      <a href="/coverage">Coverage</a>
      <a href="/docs">Docs</a>
      <a href="/explorer">Data Explorer</a>
      <a href="/docs" class="pill">API Reference</a>
    </div>
  </nav>
  <main class="page">
    <div id="masthead"></div>

    <div class="controls" id="controls">
      <div class="controls-left">
        <div>
          <div class="cmp-add-label">Mode</div>
          <div class="segmented" id="view-toggle">
            <button data-view="filter" class="on">Filter</button>
            <button data-view="rank">Rank</button>
          </div>
        </div>
      </div>
      <div class="controls-right">
        <span class="ctrl-group">
          <span class="period-label">Year</span>
          <input class="period-select scr-year" id="year-input" type="number" inputmode="numeric" min="2009" max="2099" step="1">
        </span>
        <span class="ctrl-group">
          <span class="period-label">Period</span>
          <select class="period-select" id="period-select">
            <option value="FY">FY</option>
            <option value="Q1">Q1</option>
            <option value="Q2">Q2</option>
            <option value="Q3">Q3</option>
            <option value="Q4">Q4</option>
          </select>
        </span>
      </div>
    </div>

    <div id="builder"></div>
    <div id="legend"></div>
    <div id="view" style="margin-top:18px"></div>
    <div id="disclosure"></div>
  </main>
  <div id="footer"></div>

  <script src="/static/script.js"></script>
  <script src="/static/app.js"></script>
  <script src="/static/screen.js"></script>
</body>
</html>
