<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profin — Manager</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 26 26'%3E%3Crect width='26' height='26' rx='7' fill='%231c1a16'/%3E%3Crect x='8.5' y='8.5' width='9' height='9' rx='2' fill='%23c0703a'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/app.css">
  <link rel="stylesheet" href="/static/company.css">
</head>
<body class="app has-ctx" data-shell="">
  <aside class="app-side" id="appSide" aria-label="Primary navigation"></aside>
  <div class="app-scrim" id="appScrim"></div>
  <div class="app-main">
  <header class="app-topbar" id="appTopbar"></header>
  <main class="page">
    <div id="masthead"></div>

    <div class="controls" id="controls" hidden>
      <div class="controls-right" id="period-control">
        <span class="period-label" id="period-label">Quarter (13F)</span>
        <select class="period-select" id="period-select"></select>
      </div>
    </div>

    <!-- Phase 5 polish: the standing "reported 13F long positions only" caveat, rendered once
         at the top of the page (STYLE_GUIDE §6 caption-dedup rule) -- see manager.js's
         renderStandingCaveat(). Every chart caption below keeps only its own chart-specific
         caveats instead of repeating this line. -->
    <div id="standing-caveat" class="standing-caveat-mount"></div>

    <!-- Ingestion coverage strip (Phase 5 polish): a tick per calendar quarter across the
         ingested range, filled = snapshot ingested, hollow = not -- built from the /periods
         list manager.js already fetched, no new requests. See renderCoverageStrip(). -->
    <div id="coverage-strip" class="coverage-strip-mount"></div>

    <div id="legend"></div>
    <div id="view" style="margin-top:18px"></div>

    <!-- Phase 5.4 (+ polish pass): total reported 13F value per quarter (Profin.valueLineChart)
         and the sibling position-count strip (Profin.positionCountChart), vendored Observable
         Plot. Own top-level mount, outside #view, so switching the quarter selector never
         re-fetches or re-renders it -- see manager.js's loadValueSeries. Placed BELOW the
         per-quarter sections (re-arranged): current-quarter detail first, multi-quarter
         context after. -->
    <div id="value-line" class="value-line-mount"></div>

    <div id="disclosure"></div>
  </main>
  <div id="footer"></div>
  </div>

  <!-- Vendored chart stack (STYLE_GUIDE §6): d3 must load before the Plot UMD build.
       suggest.js loads before script.js so the shell's topbar search gets autocomplete. -->
  <script src="/static/vendor/d3.min.js"></script>
  <script src="/static/vendor/plot.umd.min.js"></script>
  <script src="/static/suggest.js"></script>
  <script src="/static/script.js"></script>
  <script src="/static/app.js"></script>
  <script src="/static/manager.js"></script>
</body>
</html>
