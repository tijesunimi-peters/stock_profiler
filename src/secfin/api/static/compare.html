<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profin — Compare</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 26 26'%3E%3Crect width='26' height='26' rx='7' fill='%231c1a16'/%3E%3Crect x='8.5' y='8.5' width='9' height='9' rx='2' fill='%23c0703a'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/app.css">
  <link rel="stylesheet" href="/static/company.css">
  <link rel="stylesheet" href="/static/compare.css">
</head>
<body class="app has-ctx" data-shell="compare">
  <aside class="app-side" id="appSide" aria-label="Primary navigation"></aside>
  <div class="app-scrim" id="appScrim"></div>
  <div class="app-main">
  <header class="app-topbar" id="appTopbar"></header>
  <main class="page">
    <div id="masthead"></div>

    <div class="controls" id="controls" hidden>
      <div class="controls-left">
        <div>
          <div class="cmp-add-label">View</div>
          <div class="segmented" id="view-toggle">
            <button data-view="matrix" class="on">Matrix</button>
            <button data-view="trajectories">Trajectories</button>
          </div>
        </div>
        <div class="cmp-add">
          <div class="cmp-add-label">Add a company</div>
          <div id="search"></div>
        </div>
      </div>
      <div class="controls-right">
        <span class="ctrl-group" id="period-control" hidden>
          <span class="period-label">Fiscal year</span>
          <select class="period-select" id="year-select"></select>
        </span>
        <span class="ctrl-group" id="metric-control" hidden>
          <span class="period-label">Metric</span>
          <select class="period-select" id="metric-select"></select>
        </span>
      </div>
    </div>

    <div id="banner"></div>
    <div id="legend"></div>
    <div id="view"></div>
    <div id="disclosure"></div>
  </main>
  <div id="footer"></div>
  </div>

  <script src="/static/suggest.js"></script>
  <script src="/static/script.js"></script>
  <script src="/static/app.js"></script>
  <script src="/static/compare.js"></script>
</body>
</html>
