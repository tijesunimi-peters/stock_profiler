<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profin — Company</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 26 26'%3E%3Crect width='26' height='26' rx='7' fill='%231c1a16'/%3E%3Crect x='8.5' y='8.5' width='9' height='9' rx='2' fill='%23c0703a'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/app.css">
  <link rel="stylesheet" href="/static/company.css">
</head>
<body class="app has-ctx" data-shell="company">
  <aside class="app-side" id="appSide" aria-label="Primary navigation"></aside>
  <div class="app-scrim" id="appScrim"></div>
  <div class="app-main">
  <header class="app-topbar" id="appTopbar"></header>
  <main class="page">
    <div id="masthead"></div>

    <div class="controls" id="controls" hidden>
      <div class="controls-left">
        <div class="segmented" id="tabs">
          <button data-tab="fundamentals" class="on">Fundamentals</button>
          <button data-tab="statements">Statements</button>
          <button data-tab="insider">Insider</button>
          <button data-tab="institutional">Institutional</button>
          <button data-tab="beneficial">13D/G</button>
        </div>
        <div class="segmented" id="stmt-types" hidden>
          <button data-stmt="income" class="on">Income</button>
          <button data-stmt="balance">Balance</button>
          <button data-stmt="cashflow">Cash Flow</button>
          <button data-stmt="segments">Segments · spike</button>
        </div>
      </div>
      <div class="controls-right" id="period-control">
        <span class="period-label" id="period-label">Period</span>
        <select class="period-select" id="period-select"></select>
      </div>
    </div>

    <div id="legend"></div>
    <div id="view"></div>
    <div id="disclosure"></div>
  </main>

  <!-- Same link set/markup as Profin.footer(), kept STATIC (not JS-rendered) on purpose:
       /explorer now redirects here, and tests/test_static_pages.py asserts the raw HTML
       carries the /disclaimer and support links (guardrail: reachable without JS).
       Keep in sync with app.js. -->
  <footer class="app-footer" id="footer">
    <a href="/company/AAPL">Company hub ↗</a>
    <a href="/coverage">Data coverage ↗</a>
    <a href="/docs">API reference ↗</a>
    <a href="/methodology">Methodology ↗</a>
    <a href="/disclaimer">Data, not investment advice ↗</a>
    <a href="https://github.com/clearyfi/support/issues">Support ↗</a>
    <span class="tagline">Profin · public SEC data, cleaned &amp; queryable</span>
  </footer>
  </div>

  <!-- Vendored chart stack (STYLE_GUIDE §6): d3 must load before the Plot UMD build.
       suggest.js loads before script.js so the shell's topbar search gets autocomplete. -->
  <script src="/static/vendor/d3.min.js"></script>
  <script src="/static/vendor/plot.umd.min.js"></script>
  <script src="/static/suggest.js"></script>
  <script src="/static/script.js"></script>
  <script src="/static/app.js"></script>
  <script src="/static/company.js"></script>
</body>
</html>
